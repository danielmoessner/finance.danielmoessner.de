---
# Migrate the runtime state from the old server to the new one.
#
# Inventory requirements:
# - group `app_old`: old server
# - group `app`:     new server
#
# Notes:
# - Uses a local staging dir on the Ansible control machine.
# - Never overwrites existing files on the destination by default (`--ignore-existing`).
#   Set `app_migrate_overwrite=true` to allow overwriting destination files.

- name: Inventory sanity check
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Assert inventory contains exactly one app_old and one app host
      assert:
        that:
          - groups['app_old'] is defined
          - groups['app_old'] | length == 1
          - groups['app'] is defined
          - groups['app'] | length == 1
        fail_msg: "This playbook requires exactly one host in groups 'app_old' and 'app'."

- name: Ensure rsync is available (old server)
  hosts: app_old
  become: true
  tasks:
    - name: Install rsync
      apt:
        update_cache: true
        name:
          - rsync
        state: present

- name: Ensure rsync is available and data dirs exist (new server)
  hosts: app
  become: true
  tasks:
    - name: Install rsync
      apt:
        update_cache: true
        name:
          - rsync
        state: present

    - name: Ensure data directories exist
      file:
        path: "{{ item }}"
        state: directory
        owner: root
        group: www-data
        mode: "2770"
      loop:
        - "{{ app_data_dir }}"
        - "{{ app_data_dir }}/static"
        - "{{ app_data_dir }}/media"

- name: Pull tmp/ from old server into local staging
  hosts: app_old
  vars:
    rsync_common:
      - "--archive"
      - "--compress"
      - "--human-readable"
  tasks:
    - name: Create local staging directory
      tempfile:
        state: directory
        suffix: app-tmp-migration
      delegate_to: localhost
      register: stage_dir
      run_once: true

    - name: Persist staging directory path
      set_fact:
        app_migration_stage_dir: "{{ stage_dir.path }}"
      delegate_to: localhost
      delegate_facts: true
      run_once: true

    - name: Pull tmp/ from old server into staging
      command: >-
        rsync {{ rsync_common | join(' ') }}
        {{ (ansible_user | default('root')) }}@{{ (ansible_host | default(inventory_hostname)) }}:{{ app_data_dir }}/
        {{ hostvars['localhost'].app_migration_stage_dir }}/
      delegate_to: localhost
      run_once: true

- name: Push tmp/ from local staging to new server
  hosts: app
  vars:
    rsync_common:
      - "--archive"
      - "--compress"
      - "--human-readable"
  tasks:
    - name: Push tmp/ from staging to new server (never overwrite existing)
      command: >-
        rsync {{ rsync_common | join(' ') }} --ignore-existing
        {{ hostvars['localhost'].app_migration_stage_dir }}/
        {{ (ansible_user | default('root')) }}@{{ (ansible_host | default(inventory_hostname)) }}:{{ app_data_dir }}/
      delegate_to: localhost
      run_once: true
      when: not (app_migrate_overwrite | bool)

    - name: Push tmp/ from staging to new server (allow overwrite)
      command: >-
        rsync {{ rsync_common | join(' ') }}
        {{ hostvars['localhost'].app_migration_stage_dir }}/
        {{ (ansible_user | default('root')) }}@{{ (ansible_host | default(inventory_hostname)) }}:{{ app_data_dir }}/
      delegate_to: localhost
      run_once: true
      when: app_migrate_overwrite | bool

    - name: Ensure secrets.json permissions (if present)
      stat:
        path: "{{ app_data_dir }}/secrets.json"
      register: secrets_stat

    - name: Set secrets.json owner/group/mode
      file:
        path: "{{ app_data_dir }}/secrets.json"
        owner: root
        group: www-data
        mode: "0640"
      when: secrets_stat.stat.exists

- name: Cleanup local staging directory
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Remove staging directory
      file:
        path: "{{ app_migration_stage_dir }}"
        state: absent
      when: app_migration_stage_dir is defined
